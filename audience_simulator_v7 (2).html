<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>청중 반응 시뮬레이터</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Apple SD Gothic Neo',sans-serif;background:#1a1a2e;color:#eee;min-height:100vh;padding:1.5rem 1rem;display:flex;flex-direction:column;gap:1.2rem;align-items:center}
.title{font-size:15px;font-weight:600;letter-spacing:0.08em;color:#aaa;text-transform:uppercase}

.stage{width:100%;max-width:820px;border-radius:12px;position:relative;overflow:hidden;transition:background 0.5s}
.stage-inner{width:100%;min-height:300px;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding-bottom:1.5rem;position:relative}

/* ── 인터뷰실 ── */
.stage.interview{background:linear-gradient(180deg,#7aad6e 0%,#7aad6e 68%,#5a8a50 68%,#5a8a50 100%)}
.stage.interview::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,transparent 40%,rgba(0,0,0,0.06) 40%),linear-gradient(225deg,transparent 40%,rgba(0,0,0,0.06) 40%);pointer-events:none}

/* ── 시청각실 ── */
.stage.audiovisual{background:linear-gradient(180deg,#f5f0eb 0%,#e8e0d5 18%,#e0d5c8 32%,#c8bfb0 32%,#8B7355 62%,#6B5535 100%)}
.stage.audiovisual::before{content:'';position:absolute;top:0;left:0;right:0;height:55px;background:radial-gradient(ellipse 28px 18px at 12% 8px,rgba(255,255,210,0.95) 0%,transparent 100%),radial-gradient(ellipse 28px 18px at 30% 8px,rgba(255,255,210,0.95) 0%,transparent 100%),radial-gradient(ellipse 28px 18px at 52% 8px,rgba(255,255,210,0.95) 0%,transparent 100%),radial-gradient(ellipse 28px 18px at 72% 8px,rgba(255,255,210,0.95) 0%,transparent 100%),radial-gradient(ellipse 28px 18px at 90% 8px,rgba(255,255,210,0.95) 0%,transparent 100%);pointer-events:none;z-index:2}
.stage.audiovisual::after{content:'SCREEN';position:absolute;top:12px;left:50%;transform:translateX(-50%);width:190px;height:38px;background:linear-gradient(180deg,#fff 0%,#f0f0f0 100%);border:2px solid #ccc;border-radius:2px;display:flex;align-items:center;justify-content:center;font-size:9px;color:#bbb;letter-spacing:.2em;z-index:3}

/* ── 강의실 ── */
.stage.classroom{background:linear-gradient(180deg,#c8784a 0%,#c8784a 6%,#e8e8e0 6%,#f0ede0 30%,#ddd8c8 30%,#f0f0f0 58%,#e0e0e0 100%)}
.stage.classroom::before{content:'';position:absolute;top:8%;left:14%;right:14%;height:22%;background:#f5f0d8;border:3px solid #c8a870;border-radius:2px;box-shadow:inset 0 0 20px rgba(0,0,0,.05);pointer-events:none;z-index:1}
.stage.classroom::after{content:'';position:absolute;inset:0;background:linear-gradient(to right,rgba(150,120,90,.15) 0%,transparent 20%),linear-gradient(to left,rgba(150,120,90,.15) 0%,transparent 20%);pointer-events:none}

/* ── 회의실 ── */
.stage.meeting{background:linear-gradient(180deg,#d5d4cc 0%,#c0bfb8 8%,#b0afaa 8%,#a0a09a 42%,#888884 42%,#707070 100%)}
.stage.meeting::before{content:'';position:absolute;top:9%;left:22%;right:22%;height:29%;background:linear-gradient(135deg,#1a90d0 0%,#0a60a0 50%,#e8e8e8 50%,#d0d0d0 100%);border:4px solid #333;border-radius:3px;box-shadow:0 4px 12px rgba(0,0,0,.4);pointer-events:none;z-index:1}
/* 회의실 세로 테이블 */
.meeting-vtable{
  position:absolute;left:50%;top:12%;transform:translateX(-50%);
  width:90px;height:75%;
  background:linear-gradient(135deg,#e8e0d0 0%,#d0c8b8 40%,#c0b8a8 100%);
  border-radius:40px;
  box-shadow:4px 4px 18px rgba(0,0,0,.35),inset 0 1px 0 rgba(255,255,255,.4);
  z-index:5;
}

/* ── 공통 청중 영역 ── */
.audience-area{width:100%;position:relative;z-index:10;display:flex;align-items:flex-end;justify-content:center;padding:0 1rem}

/* ── 멤버 ── */
.member-wrap{display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;flex-shrink:0}
.member-wrap.selected .svg-slot{outline:2px solid #60BDFF;outline-offset:2px;border-radius:4px}
.member-wrap.empty-seat{cursor:default;pointer-events:none}
.member-num{display:none}

/* 레이아웃 */
.layout-interview{flex-direction:row;gap:4px;justify-content:center;align-items:flex-end}
.layout-audiovisual{flex-wrap:wrap;gap:5px;justify-content:center;align-items:flex-end;padding:0 1.5rem}
.layout-classroom{display:grid;grid-template-columns:repeat(3,1fr);gap:6px 14px;width:100%;padding:0 1.2rem}
.classroom-col{display:flex;flex-direction:column;gap:3px;align-items:center}
.classroom-row{display:flex;gap:3px;justify-content:center}
.layout-meeting{position:relative;width:100%;min-height:180px}

/* 뱃지 */
.mood-badge{font-size:11px;color:rgba(255,255,255,0.75);letter-spacing:.03em;min-height:16px;position:absolute;bottom:6px;left:50%;transform:translateX(-50%);white-space:nowrap;z-index:20;background:rgba(0,0,0,.25);padding:2px 8px;border-radius:10px}
.stage.classroom .mood-badge,.stage.interview .mood-badge{color:rgba(0,0,0,.45);background:rgba(255,255,255,.3)}

/* ── 패널 ── */
.panel{width:100%;max-width:820px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:1rem 1.2rem;display:flex;flex-direction:column;gap:1rem}
.ctrl{display:flex;flex-direction:column;gap:8px}
.ctrl-label{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:#888}
.btn-row{display:flex;gap:6px;flex-wrap:wrap}
.btn{padding:6px 13px;border-radius:6px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.06);color:#ccc;font-size:12px;cursor:pointer;transition:all .15s}
.btn:hover{background:rgba(255,255,255,.12);color:#fff}
.btn.active{border-color:#378ADD;background:rgba(55,138,221,.2);color:#60BDFF;font-weight:600}
.btn-sel{background:rgba(255,255,255,.04)}
.count-row{display:flex;align-items:center;gap:10px}
.count-row label{font-size:12px;color:#666;white-space:nowrap}
.count-row input[type=range]{flex:1;accent-color:#378ADD}
.count-val{font-size:12px;font-weight:600;min-width:28px;text-align:right;color:#aaa}

/* ── 애니메이션 ── */
@keyframes nod{0%,100%{transform:translateY(0)}40%{transform:translateY(4px)}70%{transform:translateY(-1px)}}
@keyframes lean-fwd{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-4px) rotate(-6deg)}}
@keyframes raise-face{0%,100%{transform:translateY(0) rotate(0deg)}40%{transform:translateY(-5px) rotate(-7deg)}75%{transform:translateY(0)}}
@keyframes raise-arm{0%,100%{transform:rotate(0deg)}40%{transform:rotate(-110deg) translateY(-2px)}75%{transform:rotate(0deg)}}
@keyframes clap-l{0%,100%{transform:rotate(28deg)}50%{transform:rotate(-8deg)}}
@keyframes clap-r{0%,100%{transform:rotate(-28deg)}50%{transform:rotate(8deg)}}
@keyframes happy-bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
@keyframes bored-droop{0%,100%{transform:rotate(0deg)}50%{transform:rotate(3deg) translateY(2px)}}
@keyframes confused-tilt{0%,100%{transform:rotate(0deg)}40%{transform:rotate(-11deg)}80%{transform:rotate(6deg)}}
@keyframes zzz-float{0%{opacity:0;transform:translateY(0) scale(0.7)}30%{opacity:1}100%{opacity:0;transform:translateY(-18px) scale(1)}}
@keyframes side-nod{0%,100%{transform:rotate(0deg)}40%{transform:rotate(8deg)}70%{transform:rotate(-2deg)}}
@keyframes side-lean{0%,100%{transform:translateX(0)}50%{transform:translateX(3px)}}
@keyframes side-applause{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}

.mood-nodding .am-face{animation:nod .75s ease-in-out infinite;transform-origin:bottom center}
.mood-interested .am-face{animation:lean-fwd 2.2s ease-in-out infinite;transform-origin:bottom center}
.mood-raising .am-face{animation:raise-face 2s ease-in-out infinite;transform-origin:bottom center}
.mood-raising .am-arm-r{animation:raise-arm 2s ease-in-out infinite;transform-origin:29px 25px}
.mood-applause .am-arm-l{animation:clap-l .32s ease-in-out infinite;transform-origin:right top}
.mood-applause .am-arm-r{animation:clap-r .32s ease-in-out infinite;transform-origin:left top}
.mood-applause .am-face{animation:happy-bob .32s ease-in-out infinite}
.mood-applause .am-body{animation:happy-bob .32s ease-in-out .1s infinite}
.mood-bored .am-face{animation:bored-droop 4s ease-in-out infinite;transform-origin:bottom center}
.mood-confused .am-face{animation:confused-tilt 2.2s ease-in-out infinite;transform-origin:bottom center}
.zzz-1{animation:zzz-float 2.4s ease-out infinite}
.zzz-2{animation:zzz-float 2.4s ease-out .8s infinite}
.zzz-3{animation:zzz-float 2.4s ease-out 1.6s infinite}

/* 옆모습 애니메이션 */
.side-nodding .am-face{animation:side-nod .85s ease-in-out infinite;transform-origin:bottom center}
.side-interested .am-face{animation:side-lean 2s ease-in-out infinite;transform-origin:bottom center}
.side-applause .am-face,.side-applause .am-body{animation:side-applause .35s ease-in-out infinite}
.side-bored .am-face{animation:bored-droop 4s ease-in-out infinite;transform-origin:bottom center}
.side-confused .am-face{animation:side-nod 2s ease-in-out infinite;transform-origin:bottom center}
</style>
</head>
<body>
<div class="title">🎤 청중 반응 시뮬레이터</div>

<div class="stage interview" id="stage">
  <div class="stage-inner">
    <div class="audience-area" id="audience-area"></div>
    <div class="mood-badge" id="mood-badge">반응 버튼을 눌러보세요</div>
  </div>
</div>

<div class="panel">
  <div style="display:flex;gap:1.5rem;flex-wrap:wrap">
    <div class="ctrl">
      <div class="ctrl-label">장소</div>
      <div class="btn-row" id="bg-row"></div>
    </div>
    <div class="ctrl">
      <div class="ctrl-label">청중 유형</div>
      <div class="btn-row" id="audience-row"></div>
    </div>
  </div>
  <div class="ctrl" id="count-ctrl" style="display:none">
    <div class="ctrl-label">청중 수</div>
    <div class="count-row">
      <label>1</label>
      <input type="range" id="count-slider" min="1" max="20" step="1" value="8"/>
      <label id="count-max-label">20</label>
      <span class="count-val" id="count-val">8명</span>
    </div>
  </div>
  <div class="ctrl">
    <div class="ctrl-label">사람 선택</div>
    <div class="btn-row" id="sel-row"></div>
  </div>
  <div class="ctrl">
    <div class="ctrl-label">반응</div>
    <div class="btn-row" id="mood-row"></div>
  </div>
</div>

<script>
const BG_OPTIONS=[
  {val:'interview',   label:'인터뷰실',  fixed:4,    max:4},
  {val:'audiovisual', label:'시청각실',  fixed:null, max:20},
  {val:'classroom',   label:'강의실',   fixed:null, max:18},
  {val:'meeting',     label:'회의실',   fixed:5,    max:5},
];

const SKIN_TONES=['#FDBCB4','#F9C74F','#C68642','#FFD0A0','#FDBCB4','#A0785A','#F9C74F','#FFD0A0','#FDBCB4','#C68642'];
const AUDIENCE_SHIRTS={
  professor:['#1A237E','#283593','#303F9F','#3949AB','#3F51B5','#1565C0','#0D47A1','#1976D2','#283593','#1A237E'],
  investor: ['#1B5E20','#2E7D32','#1A237E','#4A148C','#311B92','#006064','#1B5E20','#283593','#4A148C','#2E7D32'],
  boss:     ['#212121','#424242','#37474F','#263238','#455A64','#1C1C1C','#333333','#37474F','#212121','#424242'],
  general:  ['#5C6BC0','#EF5350','#26A69A','#7E57C2','#FF7043','#388E3C','#0288D1','#AD1457','#F57C00','#00838F'],
};
const AUDIENCE_OPTIONS=[
  {val:'professor',label:'교수'},
  {val:'investor', label:'투자자'},
  {val:'boss',     label:'상사'},
  {val:'general',  label:'일반 청중'},
];
const MOODS=[
  {id:'neutral',   label:'neutral'},
  {id:'nodding',   label:'nodding'},
  {id:'interested',label:'interested'},
  {id:'cold',      label:'cold'},
  {id:'raising',   label:'raising'},
  {id:'applause',  label:'applause'},
  {id:'bored',     label:'bored'},
  {id:'confused',  label:'confused'},
  {id:'phone',     label:'phone'},
];

/* 배경별 의자/책상 색 */
const CHAIR_COLORS={
  interview:   {back:'#6D4C41',desk:'#8D6E63',deskTop:'#A1887F'},
  audiovisual: {back:'#8B1A1A',desk:null,     deskTop:null},
  classroom:   {back:'#4E342E',desk:'#6B9B6B',deskTop:'#7AB87A'},
  meeting:     {back:'#37474F',desk:'#78909C',deskTop:'#90A4AE'},
};

let currentBg='interview';
let currentAudienceType='general';
let COUNT=4;
let memberMoods=[];
let selected=new Set();

function getColors(){
  const shirts=AUDIENCE_SHIRTS[currentAudienceType];
  return SKIN_TONES.map((skin,i)=>({skin,shirt:shirts[i%shirts.length],armL:shirts[i%shirts.length],armR:shirts[i%shirts.length]}));
}

/* ══════════════════════════════
   정면 SVG (인터뷰/시청각/강의)
══════════════════════════════ */
function makeSVG(mood,c,delay=0,hasDesk=true,scale=1){
  const isCold=mood==='cold',isApplause=mood==='applause',isRaising=mood==='raising';
  const isBored=mood==='bored',isConfused=mood==='confused',isPhone=mood==='phone';
  const isInterested=mood==='interested',isNodding=mood==='nodding';
  let eyes='',mouth='',extra='';

  if(isCold){
    eyes=`<circle cx="7" cy="8" r="1.6" fill="#111"/><circle cx="15" cy="8" r="1.6" fill="#111"/>
          <line x1="5" y1="6" x2="9" y2="6" stroke="#222" stroke-width="1" stroke-linecap="round"/>
          <line x1="13" y1="6" x2="17" y2="6" stroke="#222" stroke-width="1" stroke-linecap="round"/>`;
    mouth=`<path d="M6 13 Q11 11 16 13" stroke="#222" stroke-width="1" fill="none" stroke-linecap="round"/>`;
  }else if(isApplause){
    eyes=`<path d="M5 8 Q7 6 9 8" stroke="#111" stroke-width="1.3" fill="none" stroke-linecap="round"/>
          <path d="M13 8 Q15 6 17 8" stroke="#111" stroke-width="1.3" fill="none" stroke-linecap="round"/>`;
    mouth=`<path d="M5 12 Q11 17 17 12" stroke="#111" stroke-width="1.3" fill="none" stroke-linecap="round"/>`;
  }else if(isRaising){
    eyes=`<circle cx="7" cy="8" r="1.9" fill="#111"/><circle cx="15" cy="8" r="1.9" fill="#111"/>
          <circle cx="7.5" cy="7.5" r="0.6" fill="white"/><circle cx="15.5" cy="7.5" r="0.6" fill="white"/>`;
    mouth=`<ellipse cx="11" cy="13" rx="2.5" ry="1.5" fill="#C62828"/>`;
  }else if(isBored){
    eyes=`<path d="M5 8 Q7 9.5 9 8" stroke="#888" stroke-width="1.3" fill="none" stroke-linecap="round"/>
          <path d="M13 8 Q15 9.5 17 8" stroke="#888" stroke-width="1.3" fill="none" stroke-linecap="round"/>`;
    mouth=`<path d="M7 13 Q11 15 15 13" stroke="#aaa" stroke-width="1" fill="none" stroke-linecap="round"/>`;
  }else if(isConfused){
    eyes=`<circle cx="7" cy="8" r="1.6" fill="#444"/><circle cx="15" cy="8" r="1.6" fill="#444"/>`;
    mouth=`<path d="M7 12.5 Q9 14.5 13 11 Q15 10 17 12" stroke="#555" stroke-width="1" fill="none" stroke-linecap="round"/>`;
    extra=`<path d="M5 5.5 Q7 4 9 5.5" stroke="#666" stroke-width="1.1" fill="none" stroke-linecap="round"/>
           <path d="M13 4.5 Q15 6 17 4.5" stroke="#666" stroke-width="1.1" fill="none" stroke-linecap="round"/>`;
  }else if(isPhone){
    eyes=`<circle cx="8" cy="9" r="1.5" fill="#333"/><circle cx="16" cy="9" r="1.5" fill="#333"/>`;
    mouth=`<path d="M7 13 Q11 14.5 15 13" stroke="#555" stroke-width="1" fill="none" stroke-linecap="round"/>`;
    extra=`<path d="M5 5.5 Q7 4.5 9 5.5" stroke="#555" stroke-width="1" fill="none" stroke-linecap="round"/>
           <path d="M13 5.5 Q15 4.5 17 5.5" stroke="#555" stroke-width="1" fill="none" stroke-linecap="round"/>`;
  }else if(isInterested){
    eyes=`<circle cx="7" cy="8" r="1.9" fill="#111"/><circle cx="15" cy="8" r="1.9" fill="#111"/>
          <circle cx="7.5" cy="7.5" r="0.6" fill="white"/><circle cx="15.5" cy="7.5" r="0.6" fill="white"/>`;
    mouth=`<path d="M7 12 Q11 15 15 12" stroke="#333" stroke-width="1" fill="none" stroke-linecap="round"/>`;
  }else if(isNodding){
    eyes=`<circle cx="7" cy="8" r="1.6" fill="#222"/><circle cx="15" cy="8" r="1.6" fill="#222"/>`;
    mouth=`<path d="M7 12 Q11 14.5 15 12" stroke="#444" stroke-width="1" fill="none" stroke-linecap="round"/>`;
  }else{
    eyes=`<circle cx="7" cy="8" r="1.5" fill="#333"/><circle cx="15" cy="8" r="1.5" fill="#333"/>`;
    mouth=`<path d="M7 12.5 Q11 14.5 15 12.5" stroke="#555" stroke-width="1" fill="none" stroke-linecap="round"/>`;
  }

  const ch=CHAIR_COLORS[currentBg];
  const zzz=isBored?`<text class="zzz-1" x="28" y="10" font-size="7" fill="#90A4AE" font-weight="500">z</text>
    <text class="zzz-2" x="32" y="6" font-size="9" fill="#90A4AE" font-weight="500">z</text>
    <text class="zzz-3" x="36" y="2" font-size="11" fill="#90A4AE" font-weight="500">z</text>`:'';

  const armL=isCold
    ?`<path class="am-arm-l" d="M11 27 Q6 31 10 35" stroke="${c.armL}" stroke-width="5" stroke-linecap="round" fill="none"/>`
    :isApplause
    ?`<path class="am-arm-l" d="M11 27 Q4 30 7 36" stroke="${c.armL}" stroke-width="5" stroke-linecap="round" fill="none"/>
      <circle class="am-arm-l" cx="7" cy="36" r="4" fill="${c.skin}"/>`
    :`<path class="am-arm-l" d="M11 27 Q7 33 9 38" stroke="${c.armL}" stroke-width="5" stroke-linecap="round" fill="none"/>`;

  const armR_n=isApplause
    ?`<path class="am-arm-r" d="M29 27 Q36 30 33 36" stroke="${c.armR}" stroke-width="5" stroke-linecap="round" fill="none"/>
      <circle class="am-arm-r" cx="33" cy="36" r="4" fill="${c.skin}"/>`
    :isCold
    ?`<path class="am-arm-r" d="M29 27 Q34 31 30 35" stroke="${c.armR}" stroke-width="5" stroke-linecap="round" fill="none"/>
      <path d="M10 32 Q20 28 30 32" stroke="${c.shirt}" stroke-width="4" stroke-linecap="round" fill="none"/>`
    :isPhone
    ?`<path class="am-arm-r" d="M29 27 Q34 29 32 34" stroke="${c.armR}" stroke-width="5" stroke-linecap="round" fill="none"/>
      <rect class="am-arm-r" x="27" y="31" width="8" height="9" rx="1.5" fill="#333"/>`
    :`<path class="am-arm-r" d="M29 27 Q33 33 31 38" stroke="${c.armR}" stroke-width="5" stroke-linecap="round" fill="none"/>`;

  const armR_r=`<g class="am-arm-r"><path d="M29 25 Q33 14 32 8" stroke="${c.armR}" stroke-width="5" stroke-linecap="round" fill="none"/><circle cx="32" cy="7" r="4" fill="${c.skin}"/></g>`;

  const deskHTML=hasDesk&&ch.desk?`
    <rect x="0" y="40" width="40" height="20" rx="2" fill="${ch.desk}"/>
    <rect x="0" y="38" width="40" height="4" rx="1" fill="${ch.deskTop}"/>`:'';

  const w=Math.round(54*scale),h=Math.round(68*scale);
  return `<svg class="mood-${mood}" width="${w}" height="${h}" viewBox="0 0 40 60" fill="none">
    <rect x="6" y="23" width="28" height="16" rx="3" fill="${ch.back}"/>
    ${isRaising?'':armR_n}
    <g class="am-face" style="animation-delay:${delay}ms">
      <ellipse cx="20" cy="13" rx="9" ry="10" fill="${c.skin}"/>
      <g transform="translate(9,4)">${eyes}${mouth}${extra}</g>
    </g>
    <rect x="17" y="22" width="6" height="4" fill="${c.skin}"/>
    <rect class="am-body" x="11" y="24" width="18" height="14" rx="4" fill="${c.shirt}" style="animation-delay:${delay}ms"/>
    ${armL}${isRaising?armR_r:''}${zzz}${deskHTML}
  </svg>`;
}

/* ══════════════════════════════
   빈자리 SVG — 의자+책상 포함
══════════════════════════════ */
function makeEmptySeatSVG(hasDesk=true, scale=1){
  const ch=CHAIR_COLORS[currentBg];
  const deskHTML=hasDesk&&ch.desk?`
    <rect x="0" y="40" width="40" height="20" rx="2" fill="${ch.desk}" opacity="0.55"/>
    <rect x="0" y="38" width="40" height="4" rx="1" fill="${ch.deskTop}" opacity="0.55"/>`:'';
  const w=Math.round(54*scale),h=Math.round(68*scale);
  return `<svg width="${w}" height="${h}" viewBox="0 0 40 60" fill="none">
    <!-- 등받이 -->
    <rect x="6" y="23" width="28" height="16" rx="3" fill="${ch.back}" opacity="0.45"/>
    <!-- 좌판 힌트 -->
    <rect x="9" y="36" width="22" height="5" rx="2" fill="${ch.back}" opacity="0.3"/>
    ${deskHTML}
  </svg>`;
}

/* ══════════════════════════════
   옆모습 SVG (회의실 전용)
   dir: 'left'(왼쪽 바라봄) | 'right'(오른쪽 바라봄) | 'front'(정면 상석)
══════════════════════════════ */
function makeSideSVG(mood, c, dir='right', scale=1){
  const isLeft = dir==='left';
  const isFront = dir==='front';
  if(isFront) return makeSVG(mood,c,0,false,scale); // 상석은 정면

  const isCold=mood==='cold', isApplause=mood==='applause', isNodding=mood==='nodding';
  const isBored=mood==='bored', isInterested=mood==='interested', isPhone=mood==='phone';

  // 옆모습 얼굴: 타원을 비대칭으로, 눈/코/입은 한쪽에만
  const flipX = isLeft ? 'scale(-1,1) translate(-40,0)' : '';

  // 표정 (오른쪽 바라보는 기준)
  let faceDetail='';
  if(isCold){
    faceDetail=`<circle cx="26" cy="13" r="1.5" fill="#111"/>
      <line x1="23" y1="11" x2="28" y2="11" stroke="#222" stroke-width="1" stroke-linecap="round"/>
      <path d="M22 17 Q25 15 28 17" stroke="#222" stroke-width="1" fill="none" stroke-linecap="round"/>`;
  }else if(isApplause||isInterested||isNodding){
    faceDetail=`<circle cx="26" cy="13" r="1.5" fill="#222"/>
      <circle cx="26.5" cy="12.5" r="0.5" fill="white"/>
      <path d="M22 17 Q25 19 28 17" stroke="#444" stroke-width="1" fill="none" stroke-linecap="round"/>`;
  }else if(isBored){
    faceDetail=`<path d="M24 13 Q26 14.5 28 13" stroke="#888" stroke-width="1.2" fill="none" stroke-linecap="round"/>
      <path d="M22 17 Q25 17.5 28 17" stroke="#aaa" stroke-width="1" fill="none" stroke-linecap="round"/>`;
  }else if(isPhone){
    // 시선 아래
    faceDetail=`<circle cx="26" cy="14" r="1.5" fill="#333"/>
      <path d="M22 17.5 Q25 18.5 28 17.5" stroke="#555" stroke-width="1" fill="none" stroke-linecap="round"/>`;
  }else{
    faceDetail=`<circle cx="26" cy="13" r="1.5" fill="#333"/>
      <path d="M22 17 Q25 18.5 28 17" stroke="#555" stroke-width="1" fill="none" stroke-linecap="round"/>`;
  }

  // 코
  const nose=`<path d="M28 14 Q30 16 28 18" stroke="${c.skin}" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.6"/>`;

  const isRaising=mood==='raising';

  // 팔: 옆면 — 보이는 앞쪽 팔 하나만 표현
  let armHTML='', armOverHTML='';
  if(isApplause){
    // 박수: 앞쪽 팔 하나만 위로 올림
    armOverHTML=`<path class="am-arm-r" d="M24 27 Q26 20 25 13" stroke="${c.armR}" stroke-width="5" stroke-linecap="round" fill="none"/>
                 <circle cx="25" cy="12" r="3.5" fill="${c.skin}"/>`;
  }else if(isRaising){
    // 손 들기: 앞쪽 팔만 위로 쭉
    armOverHTML=`<g class="am-arm-r">
      <path d="M25 27 Q27 18 26 10" stroke="${c.armR}" stroke-width="5" stroke-linecap="round" fill="none"/>
      <circle cx="26" cy="9" r="3.5" fill="${c.skin}"/>
    </g>`;
  }else if(isCold){
    armHTML=`<path d="M16 29 Q24 31 32 29" stroke="${c.shirt}" stroke-width="5" stroke-linecap="round" fill="none"/>`;
  }else if(isPhone){
    armOverHTML=`<path class="am-arm-r" d="M25 27 Q28 24 27 19" stroke="${c.armR}" stroke-width="5" stroke-linecap="round" fill="none"/>
                 <rect x="23" y="16" width="7" height="5" rx="1" fill="#333"/>`;
  }else{
    // neutral/nodding/interested/bored/confused: 팔 아래로 자연스럽게
    armHTML=`<path class="am-arm-r" d="M25 27 Q28 32 26 38" stroke="${c.armR}" stroke-width="5" stroke-linecap="round" fill="none"/>`;
  }

  const zzz=isBored?`<text class="zzz-1" x="30" y="8" font-size="6" fill="#90A4AE">z</text>
    <text class="zzz-2" x="33" y="5" font-size="8" fill="#90A4AE">z</text>`:'';

  // 옆얼굴: 세로 타원 + 뒤통수 반원
  const moodCls=isApplause?'side-applause':isRaising?'mood-raising':isBored?'side-bored':isNodding?'side-nodding':isInterested?'side-interested':`side-${mood}`;
  const w=Math.round(50*scale), h=Math.round(62*scale);
  return `<svg class="${moodCls}" width="${w}" height="${h}" viewBox="0 0 40 58" fill="none">
    <g transform="${flipX}">
      <!-- 등받이 -->
      <rect x="6" y="24" width="26" height="14" rx="3" fill="${CHAIR_COLORS.meeting.back}"/>
      <!-- 옆 몸통 -->
      <rect class="am-body" x="14" y="25" width="16" height="13" rx="3" fill="${c.shirt}"/>
      <!-- 목 -->
      <rect x="17" y="21" width="6" height="5" fill="${c.skin}"/>
      <!-- 옆얼굴 -->
      <g class="am-face">
        <ellipse cx="22" cy="14" rx="7" ry="8.5" fill="${c.skin}"/>
        ${nose}
        ${faceDetail}
      </g>
      <!-- 일반 팔 (책상 뒤) -->
      ${armHTML}
      ${zzz}
      <!-- 올라가는 팔 (책상 앞, 맨 위 레이어) -->
      ${armOverHTML}
    </g>
  </svg>`;
}

/* 회의실 빈자리 옆모습 */
function makeEmptySideSVG(scale=1){
  const ch=CHAIR_COLORS.meeting;
  const w=Math.round(50*scale),h=Math.round(62*scale);
  return `<svg width="${w}" height="${h}" viewBox="0 0 40 58" fill="none">
    <rect x="6" y="24" width="26" height="14" rx="3" fill="${ch.back}" opacity="0.4"/>
    <rect x="9" y="36" width="20" height="4" rx="2" fill="${ch.back}" opacity="0.25"/>
  </svg>`;
}

/* ══════════════════════════════
   레이아웃 렌더
══════════════════════════════ */
function render(){
  const area=document.getElementById('audience-area');
  area.innerHTML='';
  memberMoods=Array(COUNT).fill('neutral');
  selected=new Set([...Array(COUNT).keys()]);
  const colors=getColors();

  if(currentBg==='interview')   renderInterview(area,colors);
  else if(currentBg==='audiovisual') renderAudiovisual(area,colors);
  else if(currentBg==='classroom')   renderClassroom(area,colors);
  else if(currentBg==='meeting')     renderMeeting(area,colors);

  rebuildSelButtons();
  updateBadge();
}

/* ── 인터뷰: 4명 한 줄 ── */
function renderInterview(area,colors){
  area.className='audience-area layout-interview';
  area.style.cssText='width:100%;position:relative;z-index:10;display:flex;flex-direction:row;gap:4px;justify-content:center;align-items:flex-end;padding:0 1rem';
  for(let i=0;i<4;i++){
    const c=colors[i];
    const div=document.createElement('div');
    div.className='member-wrap selected';
    div.dataset.idx=i;
    div.innerHTML=`<div class="svg-slot">${makeSVG('neutral',c,0,true,1)}</div><div class="member-num">${i+1}</div>`;
    div.onclick=()=>toggleSelect(i,div);
    area.appendChild(div);
  }
}

/* ── 시청각실: 4행*5열 대형, 책상 없음, 빈자리=의자만 ── */
function renderAudiovisual(area,colors){
  area.className='audience-area';
  area.style.cssText='width:100%;position:relative;z-index:10;display:flex;flex-direction:column;align-items:center;gap:1px;padding:0 0.5rem';

  const ROWS=4, COLS=5, TOTAL=ROWS*COLS; // 20석 고정
  const seats=shuffle([...Array(TOTAL).keys()]);
  const occupied=new Set(seats.slice(0,COUNT));
  let mi=0;

  for(let r=0;r<ROWS;r++){
    const rowEl=document.createElement('div');
    rowEl.style.cssText='display:flex;gap:2px;justify-content:center';
    for(let c=0;c<COLS;c++){
      const s=r*COLS+c;
      const div=document.createElement('div');
      div.style.cssText='display:flex;flex-direction:column;align-items:center';
      if(occupied.has(s)){
        const col=colors[mi%colors.length];
        const idx=mi;
        div.className='member-wrap selected';
        div.dataset.idx=idx;
        div.innerHTML=`<div class="svg-slot">${makeSVG('neutral',col,0,false,0.62)}</div>`;
        div.onclick=()=>toggleSelect(idx,div);
        mi++;
      }else{
        div.className='member-wrap empty-seat';
        div.innerHTML=`<div class="svg-slot">${makeEmptySeatSVG(false,0.62)}</div>`;
      }
      rowEl.appendChild(div);
    }
    area.appendChild(rowEl);
  }
}

/* ── 강의실: 6열*3행 = 18석 ── */
function renderClassroom(area,colors){
  area.className='audience-area';
  area.style.cssText='width:100%;position:relative;z-index:10;display:flex;flex-direction:column;align-items:center;gap:2px;padding:0 0.5rem';

  const COLS=6, ROWS=3, TOTAL=COLS*ROWS; // 18석
  const seats=shuffle([...Array(TOTAL).keys()]);
  const occupied=new Set(seats.slice(0,COUNT));
  let mi=0;

  for(let r=0;r<ROWS;r++){
    const row=document.createElement('div');
    row.style.cssText='display:flex;gap:2px;justify-content:center';
    for(let c=0;c<COLS;c++){
      const si=r*COLS+c;
      const div=document.createElement('div');
      div.style.cssText='display:flex;flex-direction:column;align-items:center';
      if(occupied.has(si)){
        const col=colors[mi%colors.length];
        const idx=mi;
        div.className='member-wrap selected';
        div.dataset.idx=idx;
        div.innerHTML=`<div class="svg-slot">${makeSVG('neutral',col,0,true,0.68)}</div>`;
        div.onclick=()=>toggleSelect(idx,div);
        mi++;
      }else{
        div.className='member-wrap empty-seat';
        div.innerHTML=`<div class="svg-slot">${makeEmptySeatSVG(true,0.68)}</div>`;
      }
      row.appendChild(div);
    }
    area.appendChild(row);
  }
}

/* ── 회의실: 5명 옆모습 ── */
function renderMeeting(area,colors){
  area.className='audience-area layout-meeting';
  area.style.cssText='width:100%;position:relative;z-index:10;min-height:260px';

  // 세로로 긴 회의 테이블 (가운데)
  const table=document.createElement('div');
  table.className='meeting-vtable';
  area.appendChild(table);

  // 5명 배치: 왼쪽 2명(오른쪽 바라봄), 중앙 상석(정면), 오른쪽 2명(왼쪽 바라봄)
  // 테이블 양 옆으로 상하 배치, 테이블에 바짝 붙임
  const configs=[
    {idx:0, left:'20%', top:'18%', dir:'right'},
    {idx:1, left:'20%', top:'56%', dir:'right'},
    {idx:2, left:'50%', top:'6%',  dir:'front', transform:'translateX(-50%)'},
    {idx:3, left:'62%', top:'18%', dir:'left'},
    {idx:4, left:'62%', top:'56%', dir:'left'},
  ];

  configs.forEach(cfg=>{
    const c=colors[cfg.idx%colors.length];
    const div=document.createElement('div');
    div.className='member-wrap selected';
    div.dataset.idx=cfg.idx;
    const svg=cfg.dir==='front'
      ? makeSVG('neutral',c,0,false,0.88)
      : makeSideSVG('neutral',c,cfg.dir,0.88);
    div.style.cssText=`position:absolute;left:${cfg.left};top:${cfg.top};transform:${cfg.transform||''};z-index:10`;
    div.innerHTML=`<div class="svg-slot">${svg}</div><div class="member-num">${cfg.idx+1}</div>`;
    div.onclick=()=>toggleSelect(cfg.idx,div);
    area.appendChild(div);
  });
}

/* ══════════════════════════════
   공통 유틸
══════════════════════════════ */
function toggleSelect(idx,el){
  if(selected.has(idx)){selected.delete(idx);el.classList.remove('selected');}
  else{selected.add(idx);el.classList.add('selected');}
  updateBadge();
}

function applyMoodToMember(idx,mood){
  const colors=getColors();
  const c=colors[idx%colors.length];
  const delay=mood==='applause'?(idx%2)*90:mood==='nodding'?idx*80:0;
  memberMoods[idx]=mood;
  const wrap=document.querySelector(`.member-wrap[data-idx="${idx}"]`);
  if(!wrap||wrap.classList.contains('empty-seat')) return;

  let svg='';
  if(currentBg==='meeting'){
    const dirs=['right','right','front','left','left'];
    const dir=dirs[idx]||'front';
    const scale=0.88;
    svg=dir==='front'?makeSVG(mood,c,delay,false,scale):makeSideSVG(mood,c,dir,scale);
  }else{
    const hasDesk=currentBg!=='audiovisual';
    const scale=currentBg==='classroom'?0.68:currentBg==='audiovisual'?0.62:1;
    svg=makeSVG(mood,c,delay,hasDesk,scale);
  }
  wrap.querySelector('.svg-slot').innerHTML=svg;
}

function refreshColors(){
  const colors=getColors();
  document.querySelectorAll('.member-wrap:not(.empty-seat)').forEach(wrap=>{
    const idx=parseInt(wrap.dataset.idx);
    const c=colors[idx%colors.length];
    const mood=memberMoods[idx]||'neutral';
    let svg='';
    if(currentBg==='meeting'){
      const dirs=['right','right','front','left','left'];
      const dir=dirs[idx]||'front';
      svg=dir==='front'?makeSVG(mood,c,0,false,0.88):makeSideSVG(mood,c,dir,0.88);
    }else{
      const hasDesk=currentBg!=='audiovisual';
      const scale=currentBg==='classroom'?0.68:currentBg==='audiovisual'?0.62:1;
      svg=makeSVG(mood,c,0,hasDesk,scale);
    }
    wrap.querySelector('.svg-slot').innerHTML=svg;
  });
}

function updateBadge(){
  const badge=document.getElementById('mood-badge');
  if(selected.size===0){badge.textContent='선택된 사람 없음';return;}
  if(selected.size===COUNT){
    const u=[...new Set(memberMoods)];
    badge.textContent=u.length===1?`전체: ${u[0]}`:'혼합 상태';
  }else{
    badge.textContent=[...selected].sort((a,b)=>a-b).map(i=>`${i+1}번: ${memberMoods[i]}`).join(' / ');
  }
}

function rebuildSelButtons(){
  const selRow=document.getElementById('sel-row');
  selRow.innerHTML='';
  const allBtn=document.createElement('button');
  allBtn.className='btn btn-all';allBtn.textContent='전체';
  allBtn.onclick=()=>{
    document.querySelectorAll('.member-wrap:not(.empty-seat)').forEach(w=>{selected.add(parseInt(w.dataset.idx));w.classList.add('selected');});
    updateBadge();
  };
  selRow.appendChild(allBtn);
  const noneBtn=document.createElement('button');
  noneBtn.className='btn btn-sel';noneBtn.textContent='해제';
  noneBtn.onclick=()=>{
    selected.clear();
    document.querySelectorAll('.member-wrap').forEach(w=>w.classList.remove('selected'));
    updateBadge();
  };
  selRow.appendChild(noneBtn);
  for(let i=0;i<COUNT;i++){
    const b=document.createElement('button');
    b.className='btn btn-sel';b.textContent=`${i+1}`;
    b.onclick=()=>{
      const wrap=document.querySelector(`.member-wrap[data-idx="${i}"]`);
      if(wrap) toggleSelect(i,wrap);
    };
    selRow.appendChild(b);
  }
}

function shuffle(arr){for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}return arr;}

/* ══════════════════════════════
   버튼 초기화
══════════════════════════════ */
const bgRow=document.getElementById('bg-row');
BG_OPTIONS.forEach(bg=>{
  const b=document.createElement('button');
  b.className='btn'+(bg.val==='interview'?' active':'');
  b.textContent=bg.label;
  b.onclick=()=>{
    currentBg=bg.val;
    document.getElementById('stage').className='stage '+bg.val;
    bgRow.querySelectorAll('.btn').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    const cc=document.getElementById('count-ctrl');
    if(bg.fixed!==null){
      COUNT=bg.fixed; cc.style.display='none';
    }else{
      cc.style.display='flex';
      const sl=document.getElementById('count-slider');
      sl.max=bg.max;
      document.getElementById('count-max-label').textContent=bg.max;
      COUNT=Math.min(parseInt(sl.value),bg.max);
      document.getElementById('count-val').textContent=COUNT+'명';
    }
    render();
  };
  bgRow.appendChild(b);
});

const audienceRow=document.getElementById('audience-row');
AUDIENCE_OPTIONS.forEach(opt=>{
  const b=document.createElement('button');
  b.className='btn'+(opt.val==='general'?' active':'');
  b.textContent=opt.label;
  b.onclick=()=>{
    currentAudienceType=opt.val;
    audienceRow.querySelectorAll('.btn').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    refreshColors();
  };
  audienceRow.appendChild(b);
});

document.getElementById('count-slider').addEventListener('input',function(){
  COUNT=parseInt(this.value);
  document.getElementById('count-val').textContent=COUNT+'명';
  render();
});

const moodRow=document.getElementById('mood-row');
MOODS.forEach(m=>{
  const b=document.createElement('button');
  b.className='btn';b.textContent=m.label;
  b.onclick=()=>{
    if(selected.size===0)return;
    selected.forEach(i=>applyMoodToMember(i,m.id));
    updateBadge();
  };
  moodRow.appendChild(b);
});

render();
</script>
</body>
</html>
